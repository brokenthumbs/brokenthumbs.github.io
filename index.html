<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👋</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            touch-action: none;
        }

        iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            border: 0;
            pointer-events: none;
        }

        @media (min-aspect-ratio: 16/9) {
            iframe {
                height: 56.25vw;
            }
        }

        @media (max-aspect-ratio: 16/9) {
            iframe {
                width: 177.78vh;
            }
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div id="player"></div>
    <div id="overlay"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        var player;
        function onYouTubeIframeAPIReady() {
            // Handle subdirectories (e.g. github.io/repo/ID) by taking the last segment
            const pathSegments = window.location.pathname.split('/').filter(p => p && p !== 'index.html');
            let vidId = pathSegments.pop();

            if (!vidId) {
                vidId = 'dQw4w9WgXcQ';
            }

            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: vidId,
                playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'playsinline': 1, 'loop': 1, 'playlist': vidId, 'rel': 0 },
                events: {
                    'onReady': function (e) {
                        e.target.setVolume(100);
                        e.target.playVideo();
                    }
                }
            });
        }

        document.getElementById('overlay').addEventListener('click', function () {
            if (player && typeof player.unMute === 'function') {
                player.unMute();
                player.setVolume(100);
                player.playVideo();
            }
        });
    </script>
</body>

</html>
